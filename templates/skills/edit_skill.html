{% extends 'base.html' %}

{% block title_block %}
Edit Skill
{% endblock %}

{% block content_block %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <h2 class="mb-4">Edit Skill</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="card mb-3">
                <div class="card-header">Your Experience</div>
                <div class="card-body">
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    Save Changes
                </button>
                <a href="{% url 'skills:my_skills' %}" 
                   class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
